# Docker Compose — Local Development Environment
# For production deployments, see: platform-engineering-systems repo

# Three services — one per tier.
#
# Tier 1 — nginx:    Serves React static files, proxies /api/* to Express.
# Tier 2 — server:   Express API only. Not exposed to the host directly.
# Tier 3 — db:       MySQL. Not exposed to the host directly.
#
# Only Nginx is exposed on the host (port 80).
# Express and MySQL are internal to the Docker network.
# This enforces the tier boundary at the network level, not just in code.

services:

  # ---------------------------------------------------------------------------
  # Tier 1 — Nginx (Presentation Layer)
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: Dockerfile        # Multi-stage: builder (Node) + nginx
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"                     # Only Nginx is exposed to the outside world
    depends_on:
      - server                      # Nginx proxies to server; server must start first
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # Tier 2 — Express (Application Layer)
  # ---------------------------------------------------------------------------
  server:
    build:
      context: .
      dockerfile: Dockerfile.server  # API-only Node.js image
    container_name: server
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "5000"                      # Internal only — not accessible from the host
    depends_on:
      db:
        condition: service_healthy  # Wait for MySQL healthcheck before starting
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # Tier 3 — MySQL (Data Layer)
  # ---------------------------------------------------------------------------
  db:
    image: mysql:latest
    container_name: mysql
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql  # Seed schema on first run
    expose:
      - "3306"                      # Internal only — not accessible from the host
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
