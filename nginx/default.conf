# =============================================================
# Nginx config — Bare-metal / local machine environment
# Used by: sudo cp nginx/default.conf /etc/nginx/conf.d/default.conf
#
# Key difference from docker.conf:
#   proxy_pass uses "localhost" — Express runs directly on the host machine
#   root path points to the local filesystem where Webpack outputs the build
#
# Prerequisites:
#   1. cd client && npm run build   # produces client/public/
#   2. cd server && node server.js  # Express running on port 5000
#   3. sudo cp nginx/default.conf /etc/nginx/conf.d/default.conf
#   4. sudo nginx -t && sudo systemctl reload nginx
# =============================================================

server {
    listen 80;

    # Serve compiled React build from the local filesystem
    # Webpack output path (webpack.config.js): path.resolve(__dirname, 'public')
    # → resolves to client/public/ relative to the project root
    # Adjust this path to match your actual clone location on the host machine
    location / {
        root /home/ibtisam/node-monolith-3tier-app/client/public;
        index index.html;
        # Client-side routing support: if a file/directory doesn't exist,
        # fall back to index.html and let React Router handle the URL
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy: all /api/ requests → Express running on the host
    # Express listens on localhost:5000 (server/server.js: process.env.PORT || 5000)
    location /api/ {
        proxy_pass http://localhost:5000/api/;

        # Standard reverse proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
