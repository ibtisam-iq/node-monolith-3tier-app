# =============================================================
# Nginx config — Docker / Docker Compose environment
# Used by: Dockerfile.client (COPY nginx/docker.conf /etc/nginx/conf.d/default.conf)
#
# Key difference from default.conf (bare metal):
#   proxy_pass uses "server" (Compose service name) instead of "localhost"
#   In Docker Compose, container names resolve via internal DNS on app-network
#   "localhost" inside the Nginx container = the Nginx container itself (not Express)
# =============================================================

server {
    listen 80;

    # Serve compiled React build from the Nginx default static content directory
    # Files are copied here by Dockerfile.client Stage 2:
    #   COPY --from=client-build /app/client/public /usr/share/nginx/html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Client-side routing support: if a file/directory doesn't exist,
        # fall back to index.html and let React Router handle the URL
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy: all /api/ requests → Express server container
    # "server" resolves to the Express container IP via Docker's internal DNS
    # Port 5000 is the port Express listens on (process.env.PORT || 5000)
    location /api/ {
        proxy_pass http://server:5000/api/;

        # Standard reverse proxy headers — let Express see the real client info
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
