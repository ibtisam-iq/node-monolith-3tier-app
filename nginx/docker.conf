# Nginx configuration — Tier 1 (Presentation Layer)
#
# Nginx has two responsibilities in this architecture:
#   1. Serve the pre-built React static files (HTML, JS, CSS)
#   2. Reverse-proxy all /api/* requests to the Express backend
#
# Express no longer serves any static files.
# Express only handles /api/* routes.
# This gives each tier exactly one responsibility.

server {
    listen 80;
    server_name localhost;

    # Root directory where the React build (bundle.js, index.html, CSS)
    # is copied during the Docker image build.
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly.
    # If the file exists on disk, Nginx returns it immediately —
    # no round-trip to Node.js.
    location / {
        try_files $uri $uri/ /index.html;
        # try_files: attempt exact file, then directory, then fall back to
        # index.html so React Router can handle client-side routing.
    }

    # Reverse proxy: forward all /api/* requests to Express.
    # Nginx itself never processes API logic — it just tunnels the request.
    location /api/ {
        proxy_pass         http://server:5000;
        proxy_http_version 1.1;

        # Pass the original host header so Express knows the real hostname
        proxy_set_header Host              $host;

        # Pass the real client IP so Express logs are meaningful
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
